<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Nearby Stars — 20 Light Years</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #000008;
    --grid: #1e6fc4;
    --grid-bright: #3a8fe0;
    --label: #5ec8ff;
    --label-dim: #2d7ab8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--label); font-family: 'Share Tech Mono', monospace; }
  body { cursor: grab; }
  body.grabbing { cursor: grabbing; }

  #scene {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    display: block;
    /* Render buffer is 1:1 CSS pixels; the browser then scales that to
       physical pixels for display. Default linear scaling softens edges
       on hi-DPI — nearest-neighbor preserves the crisp pixel aesthetic. */
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ---- HUD ---- */
  .hud { position: fixed; pointer-events: none; font-family: 'VT323', monospace; color: var(--label); text-shadow: 0 0 6px rgba(94,200,255,0.35); }

  #title {
    top: 14px; left: 18px; font-size: 20px; letter-spacing: 2px;
    border-left: 2px solid var(--grid-bright); padding-left: 10px; line-height: 1.1;
  }
  #title .sub { font-size: 13px; color: var(--label-dim); letter-spacing: 1px; }

  #controls {
    pointer-events: auto;
    bottom: 14px; right: 18px; font-size: 14px; letter-spacing: 1px; text-align: right;
    border-right: 2px solid var(--grid-bright); padding-right: 10px; line-height: 1.5;
  }
  #controls button {
    font-family: 'VT323', monospace; font-size: 14px; background: transparent;
    color: var(--label); border: 1px solid var(--grid); padding: 2px 8px; cursor: pointer;
    letter-spacing: 1px;
  }
  #controls button:hover { background: rgba(30,111,196,0.18); color: #cfeeff; }
  #controls button.on { background: rgba(30,111,196,0.35); color: #fff; border-color: var(--grid-bright); }

  /* Scale bar in bottom-left; width is set dynamically in JS based on zoom. */
  #scale {
    bottom: 18px; left: 18px; font-family: 'VT323', monospace;
    color: #e8f6ff; letter-spacing: 1px;
    text-shadow: 0 0 4px rgba(0,0,16,0.9);
  }
  #scale .bar {
    position: relative; height: 6px; display: flex; align-items: center;
    border-top: 1px solid #e8f6ff; width: 100px; /* JS overrides */
  }
  #scale .bar .end {
    position: absolute; width: 1px; height: 6px; background: #e8f6ff;
  }
  #scale .bar .end:first-child { left: 0; }
  #scale .bar .end:last-child  { right: 0; }
  #scale .label {
    font-size: 14px; margin-top: 2px; text-align: center;
    width: 100px; /* JS overrides to match bar */
  }

  /* subtle vignette + scanline feel */
  #overlay {
    position: fixed; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    mix-blend-mode: normal;
  }

  /* boot splash */
  #boot {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg); z-index: 10; color: var(--label); font-family: 'VT323', monospace;
    font-size: 18px; letter-spacing: 3px;
  }
  #boot .blink { animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="overlay"></div>

  <div id="title" class="hud">
    NEARBY STARS
    <div class="sub">&lt; 20 LIGHT YEARS · SOLAR NEIGHBOURHOOD</div>
  </div>

  <div id="controls" class="hud">
    <button id="btn-labels" class="on">labels</button>
    <button id="btn-drops" class="on">droplines</button>
    <button id="btn-spin">autospin</button>
    <button id="btn-reset">reset view</button>
  </div>

  <div id="scale" class="hud">
    <div class="bar"><span class="end"></span><span class="end"></span></div>
    <div class="label" id="scale-label">5 Light Years</div>
  </div>

  <div id="boot">INITIALIZING STELLAR CATALOG<span class="blink">_</span></div>

<script type="importmap">
{

    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
  }

  ["Delta Pavonis",        8.24, -5.19,-17.25, "G", 19.92],

  ["Gliese 33",        3.06, -8.14,-13.83, "K", 17.42],
  ["Gliese 205",      -9.21, 11.86, -7.18, "M", 18.50],
  ["Gliese 250 A",    -8.74, 13.90, -6.72, "K", 18.70],
  ["Gliese 250 B",    -8.74, 13.90, -6.72, "M", 18.70],
  ["Gliese 229 A",    -5.50, 11.79,-12.47, "M", 18.79],
  ["Gliese 229 B",    -5.50, 11.79,-12.47, "BD",18.79],
  ["Gliese 693",       8.50,  4.12,-15.42, "M", 19.03],
];

// Realistic stellar colors approximated from blackbody spectra at each
// spectral class's typical surface temperature (Mitchell Charity table).
//   O ~30000K  blue
//   B ~15000K  blue-white
//   A  ~9000K  white with faint blue
//   F  ~6800K  white with faint yellow
//   G  ~5800K  yellow-white (the Sun)
//   K  ~4500K  pale orange
//   M  ~3300K  orange-red
//   WD ~10000K very pale blue (high temp, small radius)
//   BD  ~1500K deep red, almost magenta
const CLASS_COLOR = {
  "O":  new THREE.Color(0x9bb0ff),
  "B":  new THREE.Color(0xaabfff),
  "A":  new THREE.Color(0xcad8ff),
  "F":  new THREE.Color(0xf8f7ff),
  "G":  new THREE.Color(0xfff4e8),
  "K":  new THREE.Color(0xffd2a1),
  "M":  new THREE.Color(0xffb56c),
  "WD": new THREE.Color(0xc8d2ff),
  "BD": new THREE.Color(0xa64633),
};

// Log-scaled stellar radii. Real stellar radii span ~6 orders of magnitude
// (white dwarf ≈ 0.01 R☉, red supergiant > 1000 R☉), but linear scaling
// makes everything either invisible or huge. We take log10(R/R☉) and map
// it into a readable visual range. Reference radii in solar radii (R☉):
//   O   ≈ 10     (luminous main-seq)
//   B   ≈ 4
//   A   ≈ 1.7    (Sirius A ≈ 1.7 R☉)
//   F   ≈ 1.3    (Procyon ≈ 2.0)
//   G   ≈ 1.0    (the Sun)
//   K   ≈ 0.7
//   M   ≈ 0.3    (red dwarfs)
//   WD  ≈ 0.01   (Earth-sized)
//   BD  ≈ 0.1    (Jupiter-sized)
const CLASS_RADIUS = {
  "O": 10.0, "B": 4.0,  "A": 1.7,  "F": 1.3,  "G": 1.0,
  "K": 0.7,  "M": 0.3,  "WD": 0.01, "BD": 0.1,
};
// Convert R/R☉ → visual size attribute. log10 maps the huge radius range
// into a manageable spread; we shift+scale so the Sun (R=1) lands at ~4.4
// shader units (matching the previous Sun size for continuity), and the
// shader clamps the final pixel size to [2, 28].
const CLASS_SIZE = {};
for (const [cls, r] of Object.entries(CLASS_RADIUS)) {
  CLASS_SIZE[cls] = 4.4 + Math.log10(r) * 1.6;
}

/* ============================================================
   SCENE
============================================================ */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: false });
// Pin the render buffer to 1 CSS pixel per drawn pixel. This is critical:
// on hi-DPI displays the default 2x/3x ratio makes gl.LINES render at 1
// *physical* pixel (= 0.5 or 0.33 CSS px), which causes sub-pixel coverage
// shimmer as the camera moves — fighting the depth-based opacity cue.
// Forcing 1:1 gives us true 1-CSS-pixel lines at the cost of slightly
// chunkier stars and grid, which actually suits the pixel-art aesthetic.
renderer.setPixelRatio(1);
renderer.setClearColor(0x000008, 1);

const scene = new THREE.Scene();
// Orthographic camera keeps drop-lines truly parallel (critical for the
// "pin to plane" geometry) and matches the reference illustration's feel.
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, -500, 500);

// Orbit-camera state. distance = ortho frustum HEIGHT in ly (i.e. zoom).
const DEFAULT_VIEW = { distance: 50, yaw: 0.9, pitch: 0.55 };
const view = {
  target: new THREE.Vector3(0, 0, 0),
  ...DEFAULT_VIEW,
  spin: false,
};

function updateCamera() {
  // Camera POSITION orbits the target on a sphere of fixed radius; the
  // ortho frustum bounds handle zoom independently of camera position.
  const R = 200;
  const sp = Math.sin(view.pitch), cp = Math.cos(view.pitch);
  const sy = Math.sin(view.yaw),   cy = Math.cos(view.yaw);
  camera.position.set(
    view.target.x + R * sp * cy,
    view.target.y + R * sp * sy,
    view.target.z + R * cp,
  );
  camera.up.set(0, 0, 1);
  camera.lookAt(view.target);
  // Force matrixWorldInverse refresh now so label projections and sprite
  // billboarding this frame see the same transform the renderer will.
  camera.updateMatrixWorld(true);

  // Refresh ortho frustum for current zoom.
  const aspect = window.innerWidth / window.innerHeight;
  const halfH = view.distance * 0.5;
  const halfW = halfH * aspect;
  camera.left = -halfW; camera.right = halfW;
  camera.top = halfH;   camera.bottom = -halfH;
  camera.updateProjectionMatrix();
}

/* ============================================================
   PIXEL-SNAPPED LINE MATERIAL
   ShaderMaterial that rounds each vertex's projected position to the
   nearest integer screen pixel before rasterization, eliminating sub-pixel
   shimmer on thin lines. Dashed variant patterns in pixel space (using
   snapped Y), so dashes stay aligned with the pixel grid.
   Used by both the grid and the droplines.
============================================================ */
const snappedMaterials = [];   // tracked so resize() can push new viewport size
function snappedLineMat(opts) {
  const isDashed = (opts.dashPx ?? 0) > 0;
  const m = new THREE.ShaderMaterial({
    defines: isDashed ? { USE_DASH: '' } : {},
    uniforms: {
      uColor:    { value: new THREE.Color(opts.color) },
      uOpacity:  { value: opts.opacity ?? 1.0 },
      uViewport: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      uDashPx:   { value: opts.dashPx ?? 1.0 },
      uGapPx:    { value: opts.gapPx  ?? 4.0 },
    },
    vertexShader: `
      uniform vec2 uViewport;
      #ifdef USE_DASH
      varying vec2 vScreenPx;
      #endif
      void main() {
        vec4 clip = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        vec2 ndc = clip.xy / clip.w;
        vec2 px  = floor((ndc * 0.5 + 0.5) * uViewport + 0.5);
        ndc = (px / uViewport) * 2.0 - 1.0;
        gl_Position = vec4(ndc * clip.w, clip.z, clip.w);
        #ifdef USE_DASH
        vScreenPx = px;
        #endif
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      uniform float uOpacity;
      #ifdef USE_DASH
      uniform float uDashPx;
      uniform float uGapPx;
      varying vec2 vScreenPx;
      void main() {
        // Drop-lines project ~vertical on screen, so Y-pixel is a
        // reliable monotonic parameter along the line.
        if (mod(vScreenPx.y, uDashPx + uGapPx) > uDashPx) discard;
        gl_FragColor = vec4(uColor, uOpacity);
      }
      #else
      void main() { gl_FragColor = vec4(uColor, uOpacity); }
      #endif
    `,
    transparent: true,
    depthWrite: false,
  });
  snappedMaterials.push(m);
  return m;
}

/* ============================================================
   GRID — concentric rings on the galactic plane, cross-axes, and an
   arrow toward the galactic centre. Each ring is split into FOUR
   90° arcs (one per plane quadrant), so the tick loop can dim the
   quadrant furthest from the camera for a subtle orientation cue.
============================================================ */
const gridGroup = new THREE.Group();
scene.add(gridGroup);

const ARROW_OPACITY_BASE = 0.9;
const ARROW_OPACITY_DIM  = 0.45;
const gridMatBright = snappedLineMat({ color: 0x3a8fe0, opacity: ARROW_OPACITY_BASE });

// Base/dim opacities for per-quadrant ring arcs. The tick loop writes into
// the material's uOpacity uniform to fade whichever quadrant is furthest.
const RING_OPACITY_BASE = 0.75;
const RING_OPACITY_DIM  = 0.45;

// Build one arc from angle a0 to a1 (radians) at the given radius.
function arc(radius, a0, a1, segments, mat) {
  const pts = [];
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const a = a0 + (a1 - a0) * t;
    pts.push(new THREE.Vector3(Math.cos(a) * radius, Math.sin(a) * radius, 0));
  }
  const g = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(g, mat);
}

// ringQuads[q] = array of { line, material } for each ring in quadrant q.
// Quadrants are numbered 0..3 starting at +X,+Y (angle 0..π/2) and going CCW.
const ringQuads = [[], [], [], []];
const RING_RADII = [5, 10, 15, 20];
const QUAD_ANGLES = [
  [0,               Math.PI * 0.5 ],  // Q0: +X, +Y
  [Math.PI * 0.5,   Math.PI       ],  // Q1: -X, +Y
  [Math.PI,         Math.PI * 1.5 ],  // Q2: -X, -Y
  [Math.PI * 1.5,   Math.PI * 2   ],  // Q3: +X, -Y
];
for (const r of RING_RADII) {
  const baseColor = (r === 20) ? 0x3a8fe0 : 0x1e6fc4;
  for (let q = 0; q < 4; q++) {
    const mat = snappedLineMat({ color: baseColor, opacity: RING_OPACITY_BASE });
    const [a0, a1] = QUAD_ANGLES[q];
    const line = arc(r, a0, a1, 32, mat);
    gridGroup.add(line);
    ringQuads[q].push({ line, mat });
  }
}

// Cross axes on the plane, split into four half-axes so each can be dimmed
// independently. An axis is dim only when BOTH of its flanking quadrants
// are dim (otherwise it IS the boundary between dim and bright halves).
const AXIS_OPACITY_BASE = RING_OPACITY_BASE;
const AXIS_OPACITY_DIM  = RING_OPACITY_DIM;
// halfAxes[i] = { line, mat, flankQuads: [q1, q2] }
const halfAxes = [
  { from: [ 0, 0, 0], to: [ 20,  0, 0], flankQuads: [0, 3] }, // +X between Q0 & Q3
  { from: [ 0, 0, 0], to: [  0, 20, 0], flankQuads: [0, 1] }, // +Y between Q0 & Q1
  { from: [ 0, 0, 0], to: [-20,  0, 0], flankQuads: [1, 2] }, // -X between Q1 & Q2
  { from: [ 0, 0, 0], to: [  0,-20, 0], flankQuads: [2, 3] }, // -Y between Q2 & Q3
].map(({ from, to, flankQuads }) => {
  const mat = snappedLineMat({ color: 0x1e6fc4, opacity: AXIS_OPACITY_BASE });
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(...from), new THREE.Vector3(...to),
  ]);
  const line = new THREE.Line(g, mat);
  gridGroup.add(line);
  return { mat, flankQuads };
});

// Galactic-centre arrow (toward +x).
{
  const shaft = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(20, 0, 0), new THREE.Vector3(24, 0, 0),
  ]);
  gridGroup.add(new THREE.Line(shaft, gridMatBright));
  const head = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(24, 0, 0), new THREE.Vector3(22.8,  0.7, 0),

/* ============================================================
   STARS — rendered as gl.POINTS with a procedural circle in the
   fragment shader (no texture sampling, no AA fringe). Per-star
   color from spectral class; per-star size from a shader attribute
   so bright (A/F/G) stars are bigger than dwarfs.
============================================================ */
// Build points geometry
const starsGeom = new THREE.BufferGeometry();
const positions = new Float32Array(STARS.length * 3);
const colors    = new Float32Array(STARS.length * 3);
const sizes     = new Float32Array(STARS.length);

STARS.forEach((s, i) => {
  positions[i*3+0] = s[1];
  positions[i*3+1] = s[2];
  positions[i*3+2] = s[3];
  const col = CLASS_COLOR[s[4]] || CLASS_COLOR["M"];
  colors[i*3+0] = col.r;
  colors[i*3+1] = col.g;
  colors[i*3+2] = col.b;
  sizes[i] = CLASS_SIZE[s[4]] || CLASS_SIZE["M"];
});
starsGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
starsGeom.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
starsGeom.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));

const starsMat = new THREE.ShaderMaterial({
  uniforms: {
    uPxScale: { value: window.innerHeight / 2 },
  },
  vertexShader: `
    attribute float aSize;
    varying vec3 vColor;
    varying float vRadius;
    uniform float uPxScale;
    void main() {
      vColor = color;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      // Round size to the nearest EVEN integer pixel count. An even-sized
      // sprite has the same number of pixel-rows above and below center
      // (and same for columns), guaranteeing the disc is symmetrical.
      // Odd sizes produce an off-center disc with a 1px lean.
      float sz = clamp(aSize * (uPxScale / 280.0) * 2.2, 2.0, 28.0);
      sz = floor(sz * 0.5 + 0.5) * 2.0;
      gl_PointSize = sz;
      vRadius = sz * 0.5;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    varying float vRadius;
    void main() {
      // Pixel offset from sprite center, snapped to integer centers so
      // the disc has hard stair-stepped edges (no AA fringe).
      vec2 px = floor((gl_PointCoord - 0.5) * (vRadius * 2.0)) + 0.5;
      if (length(px) > vRadius - 0.5) discard;
      gl_FragColor = vec4(vColor, 1.0);
    }
  `,
  vertexColors: true,
  transparent: true,
  depthWrite: false,
});

const starPoints = new THREE.Points(starsGeom, starsMat);
// Stars draw AFTER droplines so the dot always sits on top of the line
// endpoint, not behind it. (Labels use renderOrder 10, higher still.)
starPoints.renderOrder = 5;
scene.add(starPoints);

/* ============================================================
   DROP-LINES — a vertical pin from each star down (or up) to the
   galactic plane. Each star gets BOTH a solid and a dashed line
   sharing one geometry; the tick loop picks which to show based on
   which side of the plane the camera is currently viewing from, and
   modulates opacity by camera proximity for a subtle depth cue.
============================================================ */
const dropsGroup = new THREE.Group();
scene.add(dropsGroup);

const BASE_SOLID_OPACITY  = 0.85;
const BASE_DASHED_OPACITY = 0.75;
const drops = [];

STARS.forEach((s) => {
  if (s[0] === "Sun") return;
  const [, x, y, z] = s;
  const geom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x, y, z),
    new THREE.Vector3(x, y, 0),
  ]);
  const solid  = new THREE.Line(geom, snappedLineMat({ color: 0x3ad1e6, opacity: BASE_SOLID_OPACITY }));
  const dashed = new THREE.Line(geom, snappedLineMat({ color: 0x3ad1e6, opacity: BASE_DASHED_OPACITY, dashPx: 1, gapPx: 5 }));
  dropsGroup.add(solid);
  dropsGroup.add(dashed);
  drops.push({ solid, dashed, z, anchor: new THREE.Vector3(x, y, 0) });
});

// codepoint → glyph descriptor
const FONT_MAP = new Map(FONT_GLYPHS.map(g =>
  [g[0], { adv: g[1], w: g[2], h: g[3], ox: g[4], oy: g[5], rows: g[6] }]
));

function measurePixelText(text) {
  let w = 0;
  for (let i = 0; i < text.length; i++) {
    const g = FONT_MAP.get(text.charCodeAt(i));
    w += g ? g.adv : 6;
  }
  return w;
}

// Draw one glyph at (cellX, cellY). Cell is FONT_LINEH tall; glyph bitmap
// position derives from BDF metrics (bbxX as left bearing, bbxY as descent).
// All glyphs are ≤6px wide, so one byte per row suffices.
function drawPixelGlyph(g2d, ch, cellX, cellY, color) {
  const glyph = FONT_MAP.get(ch.charCodeAt(0));
  if (!glyph || glyph.w <= 0 || glyph.h <= 0) return;
  const px = cellX + glyph.ox;
  const py = cellY + FONT_ASCENT - glyph.oy - glyph.h;
  g2d.fillStyle = color;
  for (let r = 0; r < glyph.h; r++) {
    const byte = parseInt(glyph.rows[r], 16);
    for (let c = 0; c < glyph.w; c++) {
      if ((byte >> (7 - c)) & 1) g2d.fillRect(px + c, py + r, 1, 1);
    }
  }
}

/* ============================================================
   LABELS — 3D Sprites that stay coordinate-locked to star dots.
   Each is a tiny bitmap-font canvas, billboarded to face the camera,
   sized so 1 font pixel = 1 screen pixel (NearestFilter throughout).

   Two flavors:
     - default:  1px dark halo around glyphs (used for star labels)
     - box:      solid bg + 1px border, no halo (used for hover tooltip)
============================================================ */
function makeLabelTexture(text, color, opts) {
  // Accept (text, color) or (segments, _ignored, opts) where segments is
  // [{text, color}, ...] for multi-color labels.
  const segments = Array.isArray(text) ? text : [{ text, color }];
  const box = !!(opts && opts.box);
  const pad = box ? 4 : 3;
  let textW = 0;
  for (const seg of segments) textW += measurePixelText(seg.text);
  const w = textW + pad * 2;
  const h = FONT_LINEH + pad * 2;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const g = c.getContext('2d');

  if (box) {
    g.fillStyle = 'rgba(0,8,20,0.92)';
    g.fillRect(0, 0, w, h);
    g.fillStyle = '#3a8fe0';
    g.fillRect(0, 0, w, 1);  g.fillRect(0, h - 1, w, 1);
    g.fillRect(0, 0, 1, h);  g.fillRect(w - 1, 0, 1, h);
  }

  // Draw each segment's glyphs in its color.
  let cursor = pad;
  for (const seg of segments) {
    for (let i = 0; i < seg.text.length; i++) {
      drawPixelGlyph(g, seg.text[i], cursor, pad, seg.color);
      const glyph = FONT_MAP.get(seg.text.charCodeAt(i));
      cursor += glyph ? glyph.adv : 6;
    }
  }

  // Halo: fill any transparent pixel adjacent to an opaque one with dark BG.
  // Skip for boxed labels — the bg already provides contrast.
  if (!box) addDarkHalo(g, w, h);

  const t = new THREE.CanvasTexture(c);
  t.minFilter = THREE.NearestFilter;
  t.magFilter = THREE.NearestFilter;
  t.wrapS = THREE.ClampToEdgeWrapping;
  t.wrapT = THREE.ClampToEdgeWrapping;
  t.generateMipmaps = false;
  return { tex: t, w, h };
}

function addDarkHalo(g, w, h) {
  const img = g.getImageData(0, 0, w, h);
  const px = img.data;
  const mask = new Uint8Array(w * h);
  for (let i = 0, k = 0; k < mask.length; i += 4, k++) {
    mask[k] = px[i + 3] > 0 ? 1 : 0;
  }
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const k = y * w + x;
      if (mask[k]) continue;
      const has = (y > 0 && mask[k - w]) || (y < h - 1 && mask[k + w]) ||
                  (x > 0 && mask[k - 1]) || (x < w - 1 && mask[k + 1]);
      if (has) {
        const o = k * 4;
        px[o] = 0; px[o + 1] = 0; px[o + 2] = 16; px[o + 3] = 255;
      }
    }
  }
  g.putImageData(img, 0, 0);
}

/* ============================================================
   INTERACTION
============================================================ */
const pointer = { x: 0, y: 0, has: false };
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.6;

const ZOOM_MIN = 8, ZOOM_MAX = 200;   // frustum-height bounds in ly
const setZoom = (d) => { view.distance = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, d)); };

let dragging = false, panning = false, lastX = 0, lastY = 0;

canvas.addEventListener('pointerdown', (e) => {
  dragging = true;
  panning = e.shiftKey || e.button === 2;
  lastX = e.clientX; lastY = e.clientY;
  document.body.classList.add('grabbing');
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointerup', () => {
  dragging = false; panning = false;
  document.body.classList.remove('grabbing');
});
canvas.addEventListener('pointermove', (e) => {
  pointer.x = e.clientX; pointer.y = e.clientY; pointer.has = true;
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  if (panning) {
    const s = view.distance * 0.0015;
    const right = new THREE.Vector3(), up = new THREE.Vector3();
    camera.matrixWorld.extractBasis(right, up, new THREE.Vector3());
    view.target.addScaledVector(right, -dx * s);
    view.target.addScaledVector(up,    dy * s);
  } else {
    view.yaw   -= dx * 0.005;
    view.pitch -= dy * 0.005;
    view.pitch = Math.max(0.05, Math.min(Math.PI - 0.05, view.pitch));
  }
});
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  setZoom(view.distance * Math.pow(1.0015, e.deltaY));
}, { passive: false });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// --- Touch pinch-zoom -------------------------------------------------------
let pinchDist = 0;
canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    const a = e.touches[0], b = e.touches[1];
    const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    if (pinchDist > 0) setZoom(view.distance * (pinchDist / d));
    pinchDist = d;
    e.preventDefault();
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { pinchDist = 0; });

// --- Keyboard: WASD panning, QE yaw rotation -------------------------------
// Applied in the tick loop so motion is smooth and framerate-independent.
const keys = { w: false, a: false, s: false, d: false, q: false, e: false };
window.addEventListener('keydown', (e) => {
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  const k = e.key.toLowerCase();
  if (k in keys) { keys[k] = true; e.preventDefault(); }
});
window.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (k in keys) keys[k] = false;
});

// buttons
const btnLabels = document.getElementById('btn-labels');
const btnDrops  = document.getElementById('btn-drops');
const btnSpin   = document.getElementById('btn-spin');
const btnReset  = document.getElementById('btn-reset');

btnLabels.onclick = () => {

  btnLabels.classList.toggle('on', showLabels);
  gcSprite.visible = showLabels;
  axisLabels.forEach(a => a.visible = showLabels);
};

};
btnSpin.onclick = () => {
  view.spin = !view.spin;
  btnSpin.classList.toggle('on', view.spin);
};
btnReset.onclick = () => {

};

/* ============================================================
   RESIZE
============================================================ */
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  const aspect = w / h;
  // view.distance is the half-height of the ortho frustum in world units (ly)
  const halfH = view.distance * 0.5;
  const halfW = halfH * aspect;
  camera.left = -halfW; camera.right = halfW;
  camera.top = halfH;   camera.bottom = -halfH;
  camera.updateProjectionMatrix();
  starsMat.uniforms.uPxScale.value = h / 2;
  // inform all snapped-line materials about the current viewport size
  for (const m of snappedMaterials) m.uniforms.uViewport.value.set(w, h);
}
window.addEventListener('resize', resize);
resize();

/* ============================================================
   HOVER TOOLTIP — boxed Sprite that follows the hovered star.
   Texture is rebuilt only on hover transitions.
============================================================ */
const tipMat = new THREE.SpriteMaterial({
  transparent: true, depthTest: false, depthWrite: false,
});
const tipSprite = new THREE.Sprite(tipMat);
tipSprite.visible = false;
tipSprite.renderOrder = 11;  // above star labels (10)
scene.add(tipSprite);

function buildTipTexture(name, cls, distLy) {
  const segments = [
    { text: name,                 color: '#ffe98a' },
    { text: '  · ' + cls + ' · ', color: '#2d7ab8' },
    { text: distLy.toFixed(2) + ' ly', color: '#aee4ff' },
  ];
  if (tipMat.map) tipMat.map.dispose();
  const { tex, w, h } = makeLabelTexture(segments, null, { box: true });
  tipMat.map = tex;
  tipMat.needsUpdate = true;
  tipSprite.userData = { w, h };
}

/* ============================================================
   SCALE BAR — auto-picks a nice distance for the current zoom level
============================================================ */
const scaleBar   = document.querySelector('#scale .bar');
const scaleLabel = document.getElementById('scale-label');
const NICE_STEPS = [20, 10, 5, 2.5, 1, 0.5, 0.2, 0.1];

function updateScaleBar() {
  // Orthographic: pixels-per-light-year = viewportHeight / frustumHeight
  const pxPerLy = window.innerHeight / view.distance;
  // Walk from largest nice step down; pick the first one that fits under
  // ~150 px on screen. That guarantees a readable bar at any zoom.
  let chosen = NICE_STEPS[NICE_STEPS.length - 1];
  for (const step of NICE_STEPS) {
    if (step * pxPerLy <= 150) { chosen = step; break; }
  }
  const widthPx = Math.round(chosen * pxPerLy);
  scaleBar.style.width = widthPx + 'px';
  scaleLabel.style.width = widthPx + 'px';
  scaleLabel.textContent = (chosen === 1) ? '1 Light Year' : `${chosen} Light Years`;
}

/* ============================================================
   LOOP
============================================================ */
let hovered = -1;
let lastHovered = -1;
// Reusable scratch buffers to avoid per-frame allocations in the tick loop.
const _tmp3a = new THREE.Vector3();
const _tmp3b = new THREE.Vector3();
const _depthScratch = new Float32Array(drops.length);
const _camUp    = new THREE.Vector3();
const _camRight = new THREE.Vector3();
const _camFwd   = new THREE.Vector3();
const _projTmp  = new THREE.Vector3();

// Snap a sprite's world position so it projects onto the integer pixel grid.
// We project, measure fractional pixel error, then nudge along screen axes.
//
// Uses Math.floor (not Math.round): when a sprite projects to an exact
// half-pixel (e.g. the Sun at world origin → screen center), tiny FP jitter
// around 0.5 would flip rounding between frames and cause 1px twitch. floor
// always rounds the same direction so positions stay stable frame-to-frame.
function snapToPixelGrid(out, wpp) {
  _projTmp.copy(out).project(camera);
  const sx = (_projTmp.x * 0.5 + 0.5) * window.innerWidth;
  const sy = (_projTmp.y * 0.5 + 0.5) * window.innerHeight;
  out.addScaledVector(_camRight, (Math.floor(sx) - sx) * wpp);
  out.addScaledVector(_camUp,   -(Math.floor(sy) - sy) * wpp);
}

function tick() {
  if (view.spin) view.yaw += 0.0015;

  // ---- KEYBOARD MOVEMENT ---------------------------------------------------
  // WASD pans view.target along camera screen axes (zoom-scaled for
  // consistent feel). Q/E rotate yaw left/right.
  if (keys.w || keys.a || keys.s || keys.d) {
    const right = new THREE.Vector3(), up = new THREE.Vector3();
    camera.matrixWorld.extractBasis(right, up, new THREE.Vector3());
    const speed = view.distance * 0.012;
    if (keys.w) view.target.addScaledVector(up, speed);
    if (keys.s) view.target.addScaledVector(up, -speed);
    if (keys.d) view.target.addScaledVector(right, speed);
    if (keys.a) view.target.addScaledVector(right, -speed);
  }
  if (keys.q) view.yaw += 0.02;
  if (keys.e) view.yaw -= 0.02;

  updateCamera();
  updateScaleBar();

  // ---- GRID HALF-PLANE DIMMING ----------------------------------------------
  // The plane's two cross-axes divide it into four quadrants. We dim the HALF
  // (two adjacent quadrants) that sits furthest from the camera. The dividing
  // axis is chosen by whichever axis the camera is more aligned with:
  //   - camera more X-aligned (|cx| > |cy|) → split on Y-axis; dim -X or +X half
  //   - camera more Y-aligned                → split on X-axis; dim -Y or +Y half
  // Quadrant indices: Q0=(+X,+Y) Q1=(-X,+Y) Q2=(-X,-Y) Q3=(+X,-Y).
  //
  // The galactic-centre arrow lies on the +X axis, between Q0 and Q3. It
  // dims only when BOTH flanking quadrants are dim (i.e. the +X half is
  // the "far" half). If the dividing axis runs along +X itself, the arrow
  // sits on the boundary and stays bright.
  {
    const cx = camera.position.x - view.target.x;
    const cy = camera.position.y - view.target.y;
    let farQuads;
    if (Math.abs(cx) > Math.abs(cy)) {
      farQuads = (cx >= 0) ? [1, 2] : [0, 3];
    } else {
      farQuads = (cy >= 0) ? [2, 3] : [0, 1];
    }
    for (let q = 0; q < 4; q++) {
      const opacity = farQuads.includes(q) ? RING_OPACITY_DIM : RING_OPACITY_BASE;
      for (const { mat } of ringQuads[q]) {
        mat.uniforms.uOpacity.value = opacity;
      }
    }
    // Half-axes: dim only when BOTH flanking quadrants are in the far half.
    // (If only one flank is dim, this axis IS the near/far boundary — keep it
    // bright, same rule the galactic-centre arrow follows.)
    for (const { mat, flankQuads } of halfAxes) {
      const bothFar = farQuads.includes(flankQuads[0]) && farQuads.includes(flankQuads[1]);
      mat.uniforms.uOpacity.value = bothFar ? AXIS_OPACITY_DIM : AXIS_OPACITY_BASE;
    }
    const arrowDim = farQuads.includes(0) && farQuads.includes(3);
    gridMatBright.uniforms.uOpacity.value = arrowDim ? ARROW_OPACITY_DIM : ARROW_OPACITY_BASE;
  }

  // ---- DROP-LINE STYLING ----------------------------------------------------
  // Solid vs. dashed is camera-relative: a star on the same side of the plane
  // as the camera is "in front" (solid); one on the far side is "receding"
  // (dashed). Opacity is also modulated so near drops are brighter than far
  // ones, a subtle depth cue.
  const camAbove = camera.position.z >= view.target.z;
  const viewDir = _tmp3a.subVectors(view.target, camera.position).normalize();
  const camPos  = camera.position;
  // Pass 1: signed depth per drop + collect min/max along view axis.
  const depths = _depthScratch;
  let minD = Infinity, maxD = -Infinity;
  for (let i = 0; i < drops.length; i++) {
    const depth = _tmp3b.subVectors(drops[i].anchor, camPos).dot(viewDir);
    depths[i] = depth;
    if (depth < minD) minD = depth;
    if (depth > maxD) maxD = depth;
  }
  const range = Math.max(maxD - minD, 1e-4);
  // Pass 2: apply visibility (solid/dashed) and opacity mul in [1.0, 0.35].
  for (let i = 0; i < drops.length; i++) {
    const d = drops[i];
    const sameSide = (d.z >= 0) === camAbove;
    d.solid.visible  =  sameSide;
    d.dashed.visible = !sameSide;
    const mul = 1.0 - ((depths[i] - minD) / range) * 0.65;
    d.solid.material.uniforms.uOpacity.value  = BASE_SOLID_OPACITY  * mul;
    d.dashed.material.uniforms.uOpacity.value = BASE_DASHED_OPACITY * mul;
  }

  // ---- HOVER DETECTION ------------------------------------------------------
  if (pointer.has) {
    const ndc = new THREE.Vector2(
      (pointer.x / window.innerWidth) * 2 - 1,
      -(pointer.y / window.innerHeight) * 2 + 1
    );
    raycaster.setFromCamera(ndc, camera);
    const hits = raycaster.intersectObject(starPoints);
    // Pick the star whose ray-distance is smallest.
    let best = -1, bestD = Infinity;
    for (const h of hits) {
      if (h.distanceToRay !== undefined && h.distanceToRay < bestD) {
        bestD = h.distanceToRay; best = h.index;
      }
    }
    hovered = best;
  }

  if (hovered >= 0) {
    // Build/refresh the tooltip texture only when the hovered star changes.
    if (lastHovered !== hovered) {
      const s = STARS[hovered];
      buildTipTexture(s[0], s[4], s[5]);
      lastHovered = hovered;
    }
    tipSprite.visible = true;
  } else {
    tipSprite.visible = false;
    lastHovered = -1;
  }

  // ---- LABEL SIZING / POSITIONING ------------------------------------------
  // Each font pixel maps to one screen pixel via the wpp factor (world units
  // per screen pixel). Sprite world-positions are then snapped onto the
  // integer pixel grid so NearestFilter sampling stays crisp.
  const wpp = view.distance / window.innerHeight;
  camera.matrixWorld.extractBasis(_camRight, _camUp, _camFwd);

  for (const L of labels) {
    if (!showLabels) { L.sprite.visible = false; continue; }
    const s = STARS[L.idx];
    const u = L.sprite.userData;
    L.sprite.visible = true;
    L.sprite.scale.set(u.w * wpp, u.h * wpp, 1);
    // Sun's dot is bigger and shares its label color, so it needs more clearance.
    const offsetPx = Math.round(u.h * 0.5) + (u.isSun ? 22 : 6);
    L.sprite.position.set(s[1], s[2], s[3]).addScaledVector(_camUp, offsetPx * wpp);
    snapToPixelGrid(L.sprite.position, wpp);
  }

  {
    const u = gcSprite.userData;
    gcSprite.scale.set(u.w * wpp, u.h * wpp, 1);
    gcSprite.position.set(24 + (u.w * 0.5 + 6) * wpp, 0, 0);
  }

  for (const a of axisLabels) {
    const u = a.userData;
    a.scale.set(u.w * wpp, u.h * wpp, 1);
  }

  // Hover tooltip sprite: sized & positioned only when visible.
  if (tipSprite.visible && hovered >= 0) {
    const s = STARS[hovered];
    const u = tipSprite.userData;
    tipSprite.scale.set(u.w * wpp, u.h * wpp, 1);
    const offsetPx = Math.round(u.h * 0.5) + 18;
    tipSprite.position.set(s[1], s[2], s[3]).addScaledVector(_camUp, offsetPx * wpp);
    snapToPixelGrid(tipSprite.position, wpp);
  }

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

// Fade out the boot splash, then start the render loop.
setTimeout(() => {
  const boot = document.getElementById('boot');
  boot.style.transition = 'opacity 0.5s';
  boot.style.opacity = '0';
  setTimeout(() => boot.remove(), 600);
}, 350);

tick();
</script>
</body>
</html>
